# Keyless prod-infra deploy for the ISOLATED PROD environment (account
# 009907129037) — stack `eq-prod` only.
#
# manual-dispatch ONLY (no push trigger): the prod apply is a deliberate,
# founder-gated act, and this repo's other stack (`prod`) owns the LIVE DEV
# chain — a push-triggered `pulumi up` here once nearly meant dev applies with
# prod credentials. Dev-chain applies remain local (`pulumi up --stack prod`).
#
# Replaces the historical push-triggered deploy-lambda.yml (never ran green:
# its OIDC step failed on every run — secrets were never configured).
#
# NOTE: GitHub sometimes does not register a brand-new workflow on a private
# repo until a LATER push touches this file (GAP-065). If `gh workflow list`
# shows nothing, push a commit touching this file before falling back to the
# admin path.
#
# Action versions = the program's verified Node-24 set (2026-06): checkout@v5
# (deliberately NOT v6 — its credential-persistence change is unwanted),
# setup-python@v6, setup-uv pinned exact (v8+ has no floating major tags),
# configure-aws-credentials@v6 (v5 is still node20), pulumi/actions@v7.

name: Deploy prod infra

on:
  workflow_dispatch: {}

jobs:
  deploy:
    name: Package & deploy (eq-prod)
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Package Lambda
        run: bash scripts/package_lambda.sh

      # ⚠️ Install with the venv's own interpreter (`./venv/bin/python -m pip`),
      # NOT `source venv/bin/activate; pip` — if the runner's venv lands without
      # a pip binary, the activate-style install silently falls back to the
      # system pip, and pulumi/actions@v7's language host (which runs the
      # program with venv/bin/python per Pulumi.yaml `virtualenv: venv`) finds
      # no modules (`ModuleNotFoundError: pulumi`, run 27369955975). This is
      # graph-core's proven-green block.
      - name: Install Pulumi dependencies
        working-directory: infra
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/python -m pip install -r requirements.txt

      - name: Deploy with Pulumi
        uses: pulumi/actions@v7
        with:
          command: up
          stack-name: oneilstokeseqrm/action-item-graph-infra/eq-prod
          work-dir: infra
          # Pin the CLI: with no version configured the action uses the runner
          # image's preinstalled pulumi, and v3.245.0 ignores Pulumi.yaml's
          # `virtualenv: venv` (ModuleNotFoundError: pulumi — run 27410628935).
          # 3.243.0 = the program's last proven-green CI apply (graph-core,
          # run 27293339164). Bump deliberately once upstream fixes 3.245+.
          pulumi-version: '3.243.0'
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
